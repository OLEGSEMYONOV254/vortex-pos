<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Промо-страница с видео</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            background-color: #000;
        }
        
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw; /* 100% ширины вьюпорта */
            height: 100vh; /* 100% высоты вьюпорта */
            z-index: 1;
            overflow: hidden;
        }
        
        .video-container img {
            width: 100%;
            height: 100%;
            /* Ключевое свойство: растягивает фото, сохраняя пропорции, 
               обрезая лишнее, чтобы не было черных полос */
            object-fit: cover; 
            /* Центрирует изображение */
            object-position: center; 
        }
        
        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .payment-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .payment-overlay.visible {
            opacity: 1;
            visibility: visible;
        }
        
        .amount {
            font-size: 48px;
            color: #fff;
            margin-bottom: 30px;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }
        
        .qr-code {
            width: 500px;
            height: 500px;
            background-color: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.3);
        }
        
        .qr-code img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }
        
        .sound-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.3s ease;
        }
        
        .sound-btn:hover {
            background: rgba(0, 0, 0, 0.9);
        }
        
        .status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4CAF50;
        }

        .connection-info {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .amount {
                font-size: 36px;
            }
            
            .qr-code {
                width: 200px;
                height: 200px;
            }
            
            .sound-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
            
            .connection-info {
                top: 60px;
                left: 10px;
                font-size: 10px;
            }
        }

        /* Стили для бегущей строки */
        #ticker-container {
            position: absolute;
            bottom: 50px;
            left: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(90deg, rgba(0,0,0,0.8), rgba(255,0,0,0.3), rgba(0,0,0,0.8));
            color: white;
            display: none;
            align-items: center;
            overflow: hidden;
            z-index: 5;
            border-top: 2px solid #ff0000;
            border-bottom: 2px solid #ff0000;
        }
    
        #ticker-text {
            white-space: nowrap;
            padding-left: 100%;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            will-change: transform;
        }
    
        .ticker-visible {
            display: flex !important;
        }
    
        .ticker-hidden {
            display: none !important;
        }
    
        /* Анимация с переменной скоростью */
        @keyframes ticker-scroll {
            0% {
                transform: translateX(100%);
            }
            5% {
                transform: translateX(100%);
            }
            95% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(-100%);
            }
        }
        
        .ticker-scrolling {
            animation: ticker-scroll linear infinite;
            animation-timing-function: linear;
        }
    </style>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
</head>
<body>
    <div class="video-container">
        <img id="promo-image" src="/static/background.jpg" alt="Promo">
    </div>
    
    <div id="payment-overlay" class="payment-overlay">
        <div class="amount">Сумма к оплате: <span id="amount-value">0</span> ₸</div>
        <div class="qr-code">
            <img id="qr-image" src="/static/qrЖетес1.png" alt="QR-код для оплаты">
        </div>
    </div>
    
    <div class="controls">
        <button id="mute-btn" class="sound-btn">🔊</button>
    </div>

    <div class="status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Подключение...</span>
    </div>

    <div class="connection-info">
        ID: <span id="connection-id">-</span>
    </div>

    <!-- Бегущая строка -->
    <div id="ticker-container" style="
        position: fixed;
        bottom: 50px;
        left: 0;
        width: 100%;
        height: 40px;
        background: linear-gradient(90deg, rgba(0,0,0,0.8), rgba(255,0,0,0.3), rgba(0,0,0,0.8));
        color: white;
        display: none;
        align-items: center;
        overflow: hidden;
        z-index: 5;
        border-top: 2px solid #ff0000;
        border-bottom: 2px solid #ff0000;
    ">
        <div id="ticker-text" style="
            white-space: nowrap;
            padding-left: 100%;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        "></div>
    </div>

    <script>
        let tickerInterval = null;
        let currentTickerText = '';
        let currentTickerSpeed = 20;
        let isMuted = false;
        const videoIframe = document.getElementById('youtube-video');
        const muteBtn = document.getElementById('mute-btn');

        // Инициализация Socket.io
        const socket = io({
            transports: ['polling', 'websocket'],
            timeout: 10000
        });

        // Обработчики Socket.io событий
        socket.on('connect', () => {
            updateStatus('connected', 'Подключено к серверу');
            document.getElementById('connection-id').textContent = socket.id;
            console.log('Connected to server with ID:', socket.id);
            
            // Сообщаем серверу что мы промо-клиент
            socket.emit('client_ready');
        });

        socket.on('disconnect', () => {
            updateStatus('disconnected', 'Отключено от сервера');
            console.log('Disconnected from server');
        });

        socket.on('volume_changed', (data) => {
            console.log('Volume changed:', data.volume);
            setVolume(data.volume);
        });

        socket.on('video_changed', (data) => {
            console.log('Video changed:', data.videoId);
            changeVideo(data.videoId);
        });

        socket.on('show_payment', (data) => {
            console.log('Show payment:', data.amount);
            showPaymentInfo(data.amount);
        });

        socket.on('hide_payment', () => {
            console.log('Hide payment');
            hidePaymentInfo();
        });

        socket.on('control_command', (data) => {
            console.log('Control command:', data.command);
            handleControlCommand(data.command);
        });

        socket.on('command_result', (data) => {
            console.log('Server response:', data.message);
        });

        // Обработчики для бегущей строки
        socket.on('show_ticker', (data) => {
            console.log('Show ticker:', data);
            showTicker(data.text, data.speed);
        });
        
        socket.on('hide_ticker', () => {
            console.log('Hide ticker');
            hideTicker();
        });
        
        socket.on('update_ticker', (data) => {
            console.log('Update ticker:', data);
            updateTicker(data.text, data.speed);
        });
        
        // Функции управления бегущей строкой
        function showTicker(text = '', speed = 20) {
            const tickerContainer = document.getElementById('ticker-container');
            const tickerText = document.getElementById('ticker-text');
            
            if (text) {
                currentTickerText = text;
                tickerText.textContent = text;
            }
            
            if (speed) {
                currentTickerSpeed = speed;
                // Преобразуем скорость: 1-10 -> 50-5 секунд
                const animationDuration = mapSpeedToDuration(speed);
                tickerText.style.animationDuration = `${animationDuration}s`;
            }
            
            tickerContainer.classList.remove('ticker-hidden');
            tickerContainer.classList.add('ticker-visible', 'ticker-scrolling');
        }
        
        function hideTicker() {
            const tickerContainer = document.getElementById('ticker-container');
            const tickerText = document.getElementById('ticker-text');
            
            tickerText.classList.remove('ticker-scrolling');
            tickerContainer.classList.remove('ticker-visible');
            tickerContainer.classList.add('ticker-hidden');
        }
        
        function updateTicker(text, speed = 20) {
            const tickerText = document.getElementById('ticker-text');
            const tickerContainer = document.getElementById('ticker-container');
            
            if (text) {
                currentTickerText = text;
                tickerText.textContent = text;
            }
            
            if (speed) {
                currentTickerSpeed = speed;
                const animationDuration = mapSpeedToDuration(speed);
                tickerText.style.animationDuration = `${animationDuration}s`;
            }
            
            // Перезапускаем анимацию
            tickerText.classList.remove('ticker-scrolling');
            setTimeout(() => {
                tickerText.classList.add('ticker-scrolling');
            }, 10);
        }
        
        // Преобразование скорости (1-10) в длительность анимации (50-5 секунд)
        function mapSpeedToDuration(speed) {
            // speed: 1 (медленно) -> 50 секунд
            // speed: 10 (быстро) -> 5 секунд
            return 55 - (speed * 5);
        }
        
        // Пауза/возобновление при наведении
        document.getElementById('ticker-container')?.addEventListener('mouseenter', function() {
            this.querySelector('#ticker-text').style.animationPlayState = 'paused';
        });
        
        document.getElementById('ticker-container')?.addEventListener('mouseleave', function() {
            this.querySelector('#ticker-text').style.animationPlayState = 'running';
        });

        // Функция для обновления статуса
        function updateStatus(status, text) {
            const statusElement = document.getElementById('status-text');
            const dotElement = document.getElementById('status-dot');
            
            if (statusElement && dotElement) {
                statusElement.textContent = text;
                dotElement.style.backgroundColor = status === 'connected' ? '#4CAF50' : '#F44336';
            }
        }

        // Функция для обработки команд управления
        function handleControlCommand(command) {
            switch(command) {
                case 'play':
                    playVideo();
                    break;
                case 'pause':
                    pauseVideo();
                    break;
                case 'stop':
                    stopVideo();
                    break;
            }
        }

        // Функции управления видео
        function changeVideo(imageId) {
            // Если imageId — это прямой ID файла или URL
            console.log('Changing image to:', imageId);
            // Допустим, картинки лежат в той же папке и имеют расширение .jpg
            promoImage.src = `/static/${imageId}.jpg`; 
        }

        function setVolume(volume) { console.log('Volume command ignored (image mode)'); }
        function playVideo() { console.log('Play command ignored (image mode)'); }
        function pauseVideo() { console.log('Pause command ignored (image mode)'); }
        function stopVideo() { console.log('Stop command ignored (image mode)'); }

        // Функция для показа платежной информации
        function showPaymentInfo(amount) {
            const paymentOverlay = document.getElementById('payment-overlay');
            const amountValue = document.getElementById('amount-value');
            
            amountValue.textContent = amount.toLocaleString();
            paymentOverlay.classList.add('visible');
            
            // Пауза видео
            pauseVideo();
        }

        // Добавьте в промо-страницу
        document.getElementById('ticker-container')?.addEventListener('click', function() {
            // При клике на бегущую строку можно выполнить действие
            console.log('Бегущая строка кликнута:', currentTickerText);
            
            // Например, показать дополнительную информацию
            if (currentTickerText.includes('скидк') || currentTickerText.includes('акци')) {
                showPaymentInfo(5000); // Показать акционную цену
            }
        });

        // Функция для скрытия платежной информации
        function hidePaymentInfo() {
            const paymentOverlay = document.getElementById('payment-overlay');
            paymentOverlay.classList.remove('visible');
            
            // Возобновляем воспроизведение
            playVideo();
        }

        // Управление звуком
        muteBtn.addEventListener('click', function() {
            if (isMuted) {
                setVolume(70);
            } else {
                setVolume(0);
            }
        });

        // Защита от паузы
        document.addEventListener('keydown', (e) => {
            if (e.keyCode === 32 || e.key === ' ') {
                e.preventDefault();
                playVideo();
            }
        });

        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        console.log("Промо-страница загружена и готова к командам");
    </script>
</body>
</html>
