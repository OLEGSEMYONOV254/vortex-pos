<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Касса</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
      :root {
        --primary: #00cc66;
        --secondary: #ffaa00;
        --danger: #ff3333;
        --discount: #3399ff;
        --folder: #007bff; /* Цвет для папок */
        --dark-bg: #1a1a1a;
        --panel-bg: #2a2a2a;
        --text-light: #ffffff;
        --text-dimmed: #aaaaaa;
      }
      
      /* Общие стили */
      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: var(--dark-bg);
        color: var(--text-light);
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }
      
      /* Навигация */
      .nav-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px;
        background: var(--panel-bg);
        border-bottom: 1px solid #333;
      }
      
      .nav-card {
        padding: 10px 15px;
        background: #3a3a3a;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        text-align: center;
        flex: 1 1 auto;
        min-width: 60px;
        transition: all 0.2s;
      }
      
      .nav-card:hover {
        background: #444;
        transform: translateY(-2px);
      }
      
      /* Основной контейнер */
      .container {
        display: grid;
        grid-template-columns: 1fr;
        gap: 15px;
        padding: 15px;
        max-width: 100%;
      }
      
      /* Заголовок */
      .glow-text {
        text-align: center;
        color: var(--primary);
        margin: 0 0 15px 0;
        font-size: 1.8rem;
        text-shadow: 0 0 10px rgba(0, 204, 102, 0.3);
      }
      
      /* --- НОВАЯ НАВИГАЦИЯ ПО ТОВАРАМ --- */
      
      .breadcrumb-nav {
          padding: 12px;
          background: var(--panel-bg);
          margin-bottom: 10px;
          border-radius: 8px;
          font-size: 1rem;
          border-left: 4px solid var(--primary);
          cursor: default;
      }
  
      .category-search-input {
          width: 100%;
          padding: 12px;
          background: #333;
          border: 2px solid var(--folder);
          border-radius: 8px;
          color: white;
          font-size: 1rem;
          margin-bottom: 15px;
      }
  
      /* Сетка для папок (крупная) */
      .folder-grid {
          display: grid;
          grid-template-columns: repeat(2, 1fr); /* 2 папки в ряд на мобилках */
          gap: 15px;
      }
  
      /* Дизайн карточки-папки */
      .category-card {
          background: var(--panel-bg);
          border: 2px solid var(--folder);
          border-radius: 15px;
          padding: 25px 10px;
          text-align: center;
          transition: all 0.2s;
          box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }
  
      .category-card:active {
          transform: scale(0.95);
          background: #333;
      }
  
      /* Компактный список товаров (внутри папки) */
      .product-list-item {
          display: flex;
          align-items: center;
          background: var(--panel-bg);
          padding: 12px;
          margin-bottom: 8px;
          border-radius: 10px;
          border: 1px solid #444;
          animation: fadeIn 0.2s ease-out;
      }
  
      /* --- КОНЕЦ НОВОЙ НАВИГАЦИИ --- */
  
      /* Вкладки клиентов */
      .customer-tabs {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 8px 0;
        margin-bottom: 10px;
        scrollbar-width: none;
      }
      
      .customer-tab {
        padding: 8px 12px;
        background: #3a3a3a;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        white-space: nowrap;
      }
      
      .customer-tab.active {
        background: var(--primary);
        font-weight: bold;
      }
      
      .btn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
      }
      
      /* Поиск */
      .search-box {
        margin-bottom: 15px;
      }
      
      .search-box input {
        width: 100%;
        padding: 12px 15px;
        font-size: 1rem;
        border-radius: 8px;
        border: none;
        background: #333;
        color: white;
        box-sizing: border-box;
      }
      
      /* Стили сетки (для обычных товаров) */
      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 10px;
        margin-bottom: 15px;
      }
      
      /* Корзина */
      .cart-container {
        background: var(--panel-bg);
        padding: 15px;
        border-radius: 8px;
        margin-top: 15px;
      }
      
      .cart-items {
        max-height: 200px;
        overflow-y: auto;
      }
      
      .cart-total {
        font-weight: bold;
        font-size: 1.3rem;
        text-align: right;
        color: var(--primary);
        margin-top: 15px;
      }
      
      .cart-actions {
        display: flex;
        gap: 10px;
        margin-top: 15px;
        flex-wrap: wrap;
      }
      
      /* Модальные окна */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 2000;
        justify-content: center;
        align-items: center;
      }
      
      .modal-content {
        background: var(--panel-bg);
        padding: 20px;
        border-radius: 10px;
        width: 95%;
        max-width: 380px;
      }
      
      .numeric-keypad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      
      .keypad-btn {
        background: #3a3a3a;
        color: white;
        border: none;
        padding: 18px 0;
        font-size: 1.3rem;
        border-radius: 8px;
      }
  
      .keypad-btn.enter {
        background: var(--primary);
      }
  
      /* Адаптация для мобильных */
      @media (max-width: 768px) {
        .cart-container {
          position: fixed;
          bottom: 0; left: 0; right: 0;
          height: 70vh;
          transform: translateY(100%);
          transition: transform 0.3s ease;
          z-index: 1500;
          border-radius: 20px 20px 0 0;
        }
        
        .cart-container.expanded {
          transform: translateY(0);
        }
        
        .mobile-cart-toggle {
          display: flex;
          position: fixed;
          bottom: 25px;
          right: 25px;
          background: var(--primary);
          width: 65px; height: 65px;
          border-radius: 50%;
          align-items: center;
          justify-content: center;
          z-index: 1600;
          box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
      }
  
      .notification {
          position: fixed;
          top: 20px;
          left: 50%;
          transform: translateX(-50%);
          background: var(--primary);
          padding: 12px 25px;
          border-radius: 30px;
          z-index: 10000;
          box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      }
  </style>
</head>
<body>
  <!-- Навигация -->
  <nav class="nav-grid">
      <a href="/" class="nav-card">🏠 Главная</a>
      <a href="/products" class="nav-card">📦 Товары</a>
      <a href="/kassa" class="nav-card">💵 Касса</a>
      <a href="/stats" class="nav-card">📊 Отчёты</a>
      <a href="/counterparties" class="nav-card">🧾 Контрагенты</a>
  </nav>
  
  <div class="container">
      <h1 class="glow-text">Кассовый аппарат</h1>
  
      <div class="customer-tabs" id="customerTabs">
          <button class="customer-tab active" data-id="0">Клиент 1</button>
          <button class="btn" onclick="addCustomer()">+ Добавить</button>
      </div>
  
      <div class="cart-container">
          <div class="cart-header">
              <div class="cart-title">Текущий чек</div>
              <small class="hotkey-hint">F2 - оплата, F3 - очистка</small>
          </div>
  
          <div class="cart-items" id="cartItems"></div>
  
          <div class="cart-total">
              Итого: <span id="totalAmount">0</span> ₸
          </div>
  
          <div id="discountInfo" class="discount-info"></div>
  
          <div class="cart-actions">
              <div class="quick-markup-buttons">
                  <button onclick="applyQuickMarkup(36, 'НДС')" class="markup-btn">Цена с НДС (36%)</button>
                  <button onclick="applyQuickMarkup(10, 'Kaspi')" class="markup-btn">Цена Kaspi (10%)</button>
              </div>
              <button class="btn" onclick="showTotal()">💵 Показать сумму</button>
              <button class="btn btn-discount" onclick="showDiscountModal()">🎯 Скидка/Наценка (F4)</button>
              <button class="btn btn-danger" onclick="clearCart()">🧹 Очистить (F3)</button>
              <button class="btn btn-pay" onclick="processPayment()">💰 Оплатить (F2)</button>
  
              <div style="display: flex; gap: 5px; margin-top: 10px;">
                  <button class="btn" onclick="sendToPromo('play')" title="Возобновить видео">▶️ Воспр.</button>
                  <button class="btn" onclick="sendToPromo('pause')" title="Приостановить видео">⏸️ Пауза</button>
                  <button class="btn btn-danger" onclick="hideTotalOnScreen()" title="Скрыть сумму">👻 Скрыть</button>
              </div>
          </div>
      </div>
  
      <div class="inventory-section">
          <div class="search-box">
              <input type="text" id="searchInput" placeholder="Поиск товара по всей базе... (F1)" oninput="searchProducts()">
          </div>
  
          <div id="breadcrumb" class="breadcrumb-nav">🏠 Все</div>
  
          <div id="categoryFilterContainer" style="margin-bottom: 10px; display: none;">
              <input type="text" id="categorySearchInput" placeholder="Поиск категории..." oninput="filterFolders()" class="category-search-input">
          </div>
  
          <div class="category-container" id="categoryContainer" style="display:none;"></div>
  
          <div class="product-grid" id="productGrid"></div>
      </div>
  </div>
  
  <div id="quantityModal" class="modal">
      <div class="modal-content">
          <h3 class="modal-title" id="modalProductName"></h3>
          <input type="text" class="quantity-input" id="quantityInput" placeholder="Количество" onkeydown="handleQuantityKeyDown(event)">
          <div class="numeric-keypad">
              <button class="keypad-btn" onclick="appendToQuantity('1')">1</button>
              <button class="keypad-btn" onclick="appendToQuantity('2')">2</button>
              <button class="keypad-btn" onclick="appendToQuantity('3')">3</button>
              <button class="keypad-btn" onclick="appendToQuantity('4')">4</button>
              <button class="keypad-btn" onclick="appendToQuantity('5')">5</button>
              <button class="keypad-btn" onclick="appendToQuantity('6')">6</button>
              <button class="keypad-btn" onclick="appendToQuantity('7')">7</button>
              <button class="keypad-btn" onclick="appendToQuantity('8')">8</button>
              <button class="keypad-btn" onclick="appendToQuantity('9')">9</button>
              <button class="keypad-btn" onclick="appendToQuantity('.')">.</button>
              <button class="keypad-btn zero" onclick="appendToQuantity('0')">0</button>
              <button class="keypad-btn clear" onclick="clearQuantity()">C</button>
          </div>
          <div class="modal-actions">
              <button class="keypad-btn enter" onclick="addToCartWithQuantity()">Добавить (Enter)</button>
              <button class="btn btn-danger" onclick="closeQuantityModal()">Отмена (Esc)</button>
          </div>
      </div>
  </div>
  
  <div id="discountModal" class="modal">
      <div class="modal-content">
          <h3 class="modal-title">Скидка / Наценка</h3>
          <div class="discount-type-selector">
              <button class="discount-type-btn discount-btn active" id="discountBtn" onclick="setDiscountType('discount')">Скидка %</button>
              <button class="discount-type-btn markup-btn" id="markupBtn" onclick="setDiscountType('markup')">Наценка %</button>
          </div>
          <input type="text" class="quantity-input" id="discountInput" placeholder="Введите процент" onkeydown="handleDiscountKeyDown(event)">
          <div class="numeric-keypad">
              <button class="keypad-btn" onclick="appendToDiscount('1')">1</button>
              <button class="keypad-btn" onclick="appendToDiscount('2')">2</button>
              <button class="keypad-btn" onclick="appendToDiscount('3')">3</button>
              <button class="keypad-btn" onclick="appendToDiscount('4')">4</button>
              <button class="keypad-btn" onclick="appendToDiscount('5')">5</button>
              <button class="keypad-btn" onclick="appendToDiscount('6')">6</button>
              <button class="keypad-btn" onclick="appendToDiscount('7')">7</button>
              <button class="keypad-btn" onclick="appendToDiscount('8')">8</button>
              <button class="keypad-btn" onclick="appendToDiscount('9')">9</button>
              <button class="keypad-btn" onclick="appendToDiscount('.')">.</button>
              <button class="keypad-btn zero" onclick="appendToDiscount('0')">0</button>
              <button class="keypad-btn clear" onclick="clearDiscount()">C</button>
          </div>
          <div class="modal-actions">
              <button class="keypad-btn enter" onclick="applyDiscount()">Применить (Enter)</button>
              <button class="btn btn-danger" onclick="closeDiscountModal()">Отмена (Esc)</button>
          </div>
      </div>
  </div>
  
  <div id="paymentModal" class="modal">
      <div class="modal-content payment-modal-content">
          <h3 class="modal-title">Оформление оплаты</h3>
          <div class="payment-input-group">
              <label>Способ оплаты</label>
              <select id="paymentMethod">
                  <option value="cash">💰 Наличные</option>
                  <option value="card">💳 Карта</option>
                  <option value="qr">📱 QR-код</option>
                  <option value="remote">🌐 Удалённая оплата</option>
                  <option value="bill">📄 Счёт на оплату</option>
                  <option value="cash/qr">💰/📱 Наличные+QR</option>
              </select>
          </div>
          <div class="payment-input-group">
              <label>Организация</label>
              <select id="organizationSelect">
                  <option value="Жетес">🏢 Жетес</option>
                  <option value="AS Qadir">🏭 AS Qadir</option>
                  <option value="ЭФФИ">🏭 ЭФФИ</option>
                  <option value="Адым Инжениринг">🏭 Адым Инжениринг</option>
              </select>
          </div>
          <div class="payment-input-group">
              <label>Контрагент</label>
              <select id="counterpartySelect">
                  <option value="">Не выбрано</option>
              </select>
          </div>
          <div class="modal-actions">
              <button class="btn btn-pay" onclick="confirmPayment()">✅ Подтвердить</button>
              <button class="btn btn-danger" onclick="closePaymentModal()">❌ Отмена (Esc)</button>
          </div>
      </div>
  </div>
  
  <div class="mobile-cart-toggle" id="mobileCartToggle">
      🛒 <span id="cartCounter">0</span>
  </div>

  <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
  <script>
    // Глобальные переменные
    let customers = [
      {
        id: 0,
        name: "Клиент 1",
        cart: [],
        paymentMethod: "",
        organization: "",
        counterpartyId: null,
        discount: {
          type: null, // 'discount' или 'markup'
          percent: 0,
          amount: 0
        }
      }
    ];
    let currentCustomerId = 0;
    let allProducts = [];
    let currentProduct = null;
    let counterparties = [];
    let discountType = 'discount'; // 'discount' или 'markup'
    const socket = io();
    const CART_STORAGE_KEY = 'saved_cart';
    const kassaSocket = io();

    // Подключение кассы к серверу
    kassaSocket.on('connect', () => {
        console.log('💰 Касса подключена к серверу');
        kassaSocket.emit('kassa_connect');
    });

    kassaSocket.on('disconnect', () => {
        console.log('❌ Касса отключена от сервера');
    });

    kassaSocket.on('command_result', (data) => {
        console.log('📨 Ответ от сервера:', data.message);
        if (data.success) {
            showNotification(data.message, 'success');
        } else {
            showNotification(data.message, 'error');
        }
    });

    // Функция показа суммы на промо-экране
    function showTotalOnScreen(amount, customerName = '') {
        kassaSocket.emit('show_total_on_screen', {
            amount: amount,
            customer_name: customerName
        });
    }

    // Функция скрытия суммы с промо-экрана
    function hideTotalOnScreen() {
        kassaSocket.emit('hide_total_on_screen');
    }

    // Функция отправки команд на промо-экран
    function sendToPromo(command) {
        kassaSocket.emit('kassa_command', {
            command: command
        });
    }

    function updateCartCounter() {
      const customer = getCurrentCustomer();
      if (!customer) return;
      
      const totalItems = customer.cart.reduce((sum, item) => sum + item.quantity, 0);
      const cartCounter = document.getElementById('cartCounter');
      if (cartCounter) {
        cartCounter.textContent = totalItems;
      }
    }

    function updateCartDisplay() {
      const customer = getCurrentCustomer();
      if (!customer) return;
      
      const cartItems = document.getElementById('cartItems');
      const totalAmount = document.getElementById('totalAmount');
      const discountInfo = document.getElementById('discountInfo');
      
      if (!cartItems || !totalAmount || !discountInfo) return;
      
      cartItems.innerHTML = '';
      
      let subtotal = 0;
      let totalItems = 0;
      
      customer.cart.forEach(item => {
        subtotal += parseFloat(item.total);
        totalItems += item.quantity;
        
        const cartItem = document.createElement('div');
        cartItem.className = 'cart-item fade-in';
        cartItem.innerHTML = `
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-details">${item.price} ₸ × ${item.quantity} = ${item.total} ₸</div>
          </div>
          <div class="cart-item-controls">
            <button class="quantity-btn" onclick="changeQuantity(${item.id}, -0.5)">-0.5</button>
            <button class="quantity-btn" onclick="changeQuantity(${item.id}, 0.5)">+0.5</button>
            <button class="remove-btn" onclick="removeFromCart(${item.id})">×</button>
          </div>
        `;
        cartItems.appendChild(cartItem);
      });
      
      // Применяем скидку/наценку если есть
      let total = subtotal;
      let discountAmount = 0;
      
      if (customer.discount.type && customer.discount.percent > 0) {
        if (customer.discount.type === 'discount') {
          discountAmount = subtotal * (customer.discount.percent / 100);
          total = subtotal - discountAmount;
        } else if (customer.discount.type === 'markup') {
          discountAmount = subtotal * (customer.discount.percent / 100);
          total = subtotal + discountAmount;
        }
        
        // Обновляем информацию о скидке/наценке
        customer.discount.amount = discountAmount;
        
        // Показываем информацию о скидке/наценке
        discountInfo.innerHTML = `
          ${customer.discount.type === 'discount' ? 'Скидка' : 'Наценка'}: 
          <span class="discount-amount">${customer.discount.percent}% (${Math.round(discountAmount)} ₸)</span>
          <button class="remove-btn" style="margin-left: 10px; width: 20px; height: 20px; font-size: 12px;" onclick="removeDiscount()">×</button>
        `;
      } else {
        discountInfo.innerHTML = '';
      }
      
      totalAmount.textContent = Math.round(total);
      updateCartCounter();
      saveCartToStorage();
    }
    
    // Фокус на поиск
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
      searchInput.focus();
    }
    
    // Обработчики горячих клавиш
    document.addEventListener('keydown', handleHotkeys);
    
    // Сокет-события
    if (socket) {
      socket.on('receipt_processed', (data) => {
        console.log('Чек обработан:', data);
      });
      
      socket.on('show_total', (data) => {
        console.log('Сумма на экране:', data);
      });
    }

    // Инициализация при загрузке
    document.addEventListener('DOMContentLoaded', async () => {
      // Загрузка тестовых данных
      await loadProducts();
      await loadCounterparties();
      
      // Инициализация интерфейса
      renderCategoryMenu(allProducts);
      renderProducts(allProducts);
      renderCustomerTabs();
      
      // Восстановление корзины из localStorage
      loadCartFromStorage();

      const mobileCartToggle = document.getElementById('mobileCartToggle');
      const cartContainer = document.querySelector('.cart-container');
      
      if (mobileCartToggle && cartContainer) {
        mobileCartToggle.addEventListener('click', () => {
          cartContainer.classList.toggle('expanded');
        });
      }

      // Обновляем счетчик товаров
      updateCartCounter();

      setTimeout(() => {
          hideTotalOnScreen();
      }, 1000);
    });

    // ================== ФУНКЦИИ РАБОТЫ С КЛИЕНТАМИ ================== //
    
    function getCurrentCustomer() {
      return customers.find(c => c.id === currentCustomerId) || customers[0];
    }
    
    function addCustomer() {
      const newId = customers.length > 0 ? Math.max(...customers.map(c => c.id)) + 1 : 0;
      customers.push({
        id: newId,
        name: `Клиент ${newId + 1}`,
        cart: [],
        paymentMethod: "",
        organization: "",
        counterpartyId: null,
        discount: {
          type: null,
          percent: 0,
          amount: 0
        }
      });
      
      renderCustomerTabs();
      switchCustomer(newId);
    }
    
    function switchCustomer(customerId) {
      currentCustomerId = customerId;
      
      // Обновляем активную вкладку
      document.querySelectorAll('.customer-tab').forEach(tab => {
        tab.classList.remove('active');
        if (parseInt(tab.dataset.id) === customerId) {
          tab.classList.add('active');
        }
      });
      
      // Обновляем отображение корзины
      updateCartDisplay();
    }
    
    function renderCustomerTabs() {
      const container = document.getElementById('customerTabs');
      if (!container) return;
      
      // Сохраняем кнопку добавления
      const addBtn = container.querySelector('.btn');
      container.innerHTML = '';
      
      customers.forEach(customer => {
        const tab = document.createElement('button');
        tab.className = `customer-tab ${customer.id === currentCustomerId ? 'active' : ''}`;
        tab.textContent = customer.name;
        tab.dataset.id = customer.id;
        tab.onclick = () => switchCustomer(customer.id);
        container.appendChild(tab);
      });
      
      // Возвращаем кнопку добавления
      if (addBtn) {
        container.appendChild(addBtn);
      }
    }

    // ================== ФУНКЦИИ РАБОТЫ С КОРЗИНОЙ ================== //
    
    function saveCartToStorage() {
      localStorage.setItem(CART_STORAGE_KEY, JSON.stringify({
        customers: customers,
        currentCustomerId: currentCustomerId
      }));
    }

    function loadCartFromStorage() {
      try {
        const savedData = localStorage.getItem(CART_STORAGE_KEY);
        if (savedData) {
          const data = JSON.parse(savedData);
          customers = data.customers || customers;
          currentCustomerId = data.currentCustomerId || currentCustomerId;
          renderCustomerTabs();
          updateCartDisplay();
        }
      } catch (e) {
        console.error('Ошибка при загрузке корзины:', e);
        clearSavedCart();
      }
    }

    function clearSavedCart() {
      localStorage.removeItem(CART_STORAGE_KEY);
    }
    
    function addToCart(product, quantity = 1) {
      if (!product || !product.id || !product.price) return;
      
      const customer = getCurrentCustomer();
      if (!customer) return;
      
      const existingItem = customer.cart.find(item => item.id === product.id);
      const total = Math.round(product.price * quantity * 100) / 100;
      const toggle = document.getElementById('mobileCartToggle');
      
      if (toggle) {
        toggle.classList.add('added');
        setTimeout(() => toggle.classList.remove('added'), 500);
      }
      
      if (existingItem) {
        existingItem.quantity = parseFloat((existingItem.quantity + quantity).toFixed(2));
        existingItem.total = Math.round(existingItem.price * existingItem.quantity * 100) / 100;
      } else {
        customer.cart.push({
          id: product.id,
          name: product.name,
          price: product.price,
          quantity: quantity,
          total: total
        });
      }
      
      updateCartDisplay();
    }

    function changeQuantity(productId, delta) {
      const customer = getCurrentCustomer();
      if (!customer) return;
      
      const item = customer.cart.find(item => item.id === productId);
      if (item) {
        item.quantity = parseFloat((item.quantity + delta).toFixed(2));
        if (item.quantity <= 0) {
          customer.cart = customer.cart.filter(i => i.id !== productId);
        } else {
          item.total = Math.round(item.price * item.quantity * 100) / 100;
        }
        updateCartDisplay();
      }
    }

    function removeFromCart(productId) {
      const customer = getCurrentCustomer();
      if (!customer) return;
      
      customer.cart = customer.cart.filter(item => item.id !== productId);
      updateCartDisplay();
    }

    function clearCart() {
      const customer = getCurrentCustomer();
      if (!customer) return;
      
      customer.cart = [];
      customer.discount = {
        type: null,
        percent: 0,
        amount: 0
      };
      updateCartDisplay();
    }

    // ================== ФУНКЦИИ СКИДКИ/НАЦЕНКИ ================== //
    
    function showDiscountModal() {
      const customer = getCurrentCustomer();
      if (!customer || customer.cart.length === 0) {
        alert('Добавьте товары в чек перед применением скидки/наценки');
        return;
      }
      
      const modal = document.getElementById('discountModal');
      if (!modal) return;
      
      // Сбрасываем ввод
      const discountInput = document.getElementById('discountInput');
      if (discountInput) {
        discountInput.value = '';
        discountInput.placeholder = 'Введите процент';
      }
      
      // Устанавливаем активный тип
      setDiscountType(customer.discount.type || 'discount');
      
      modal.style.display = 'flex';
      
      setTimeout(() => {
        if (discountInput) {
          discountInput.focus();
        }
      }, 100);
    }
    
    function closeDiscountModal() {
      const modal = document.getElementById('discountModal');
      if (modal) {
        modal.style.display = 'none';
      }
    }
    
    function setDiscountType(type) {
      discountType = type;
      
      const discountBtn = document.getElementById('discountBtn');
      const markupBtn = document.getElementById('markupBtn');
      
      if (discountBtn && markupBtn) {
        discountBtn.classList.toggle('active', type === 'discount');
        markupBtn.classList.toggle('active', type === 'markup');
      }
    }
    
    function appendToDiscount(value) {
      const input = document.getElementById('discountInput');
      if (!input) return;
      
      let current = input.value;
      
      if (value === '.' && current.includes('.')) {
        return;
      }
      
      input.value = current + value;
    }
    
    function clearDiscount() {
      const input = document.getElementById('discountInput');
      if (input) {
        input.value = '';
      }
    }
    
    function handleDiscountKeyDown(event) {
      // Разрешаем: цифры (0-9), точка, Backspace, Delete, Tab, Enter
      if ((event.key >= '0' && event.key <= '9') || 
          event.key === '.' || 
          event.key === 'Backspace' || 
          event.key === 'Delete' || 
          event.key === 'Tab' || 
          event.key === 'Enter') {
        return;
      }
      
      // Запрещаем все остальные символы
      event.preventDefault();
    }
    
    function applyDiscount() {
      const discountInput = document.getElementById('discountInput');
      if (!discountInput) return;
      
      const percent = parseFloat(discountInput.value) || 0;
      
      if (percent <= 0 || percent > 100) {
        alert('Введите корректный процент (0-100)');
        return;
      }
      
      const customer = getCurrentCustomer();
      if (!customer) return;
      
      customer.discount = {
        type: discountType,
        percent: percent,
        amount: 0
      };
      
      updateCartDisplay();
      closeDiscountModal();
    }
    
    function removeDiscount() {
      const customer = getCurrentCustomer();
      if (!customer) return;
      
      customer.discount = {
        type: null,
        percent: 0,
        amount: 0
      };
      
      updateCartDisplay();
    }

    // ================== ФУНКЦИИ РАБОТЫ С ТОВАРАМИ ================== //
    
    async function loadProducts() {
      try {
        const response = await fetch('/get_products');
        if (!response.ok) throw new Error('Ошибка загрузки товаров');
        
        allProducts = await response.json();
        renderCategoryMenu(allProducts);
        renderProducts(allProducts);
      } catch (error) {
        console.error('Ошибка загрузки товаров:', error);
        alert('Не удалось загрузить товары. Пожалуйста, попробуйте позже.');
        allProducts = [];
      }
    }
    
    async function loadCounterparties() {
      try {
        const response = await fetch('/api/counterparties');
        if (!response.ok) throw new Error('Ошибка загрузки контрагентов');
        
        counterparties = await response.json();
        updateCounterpartySelect();
      } catch (error) {
        console.error('Ошибка загрузки контрагентов:', error);
        counterparties = [];
      }
    }
    
    function updateCounterpartySelect() {
      const select = document.getElementById('counterpartySelect');
      if (!select) return;
      
      select.innerHTML = '<option value="">Не выбрано</option>';
      counterparties.forEach(c => {
        const option = document.createElement('option');
        option.value = c.id;
        option.textContent = c.name;
        select.appendChild(option);
      });
    }
    
    function renderCategoryMenu(products) {
      const container = document.getElementById('categoryContainer');
      if (!container) return;
      
      const categories = ['Все', ...new Set(products.map(p => p.category || 'Без категории'))];
      
      container.innerHTML = '';
      categories.forEach(category => {
        const btn = document.createElement('button');
        btn.className = 'category-btn';
        btn.textContent = category;
        if (category === 'Все') btn.classList.add('active');
        btn.onclick = () => filterByCategory(category);
        container.appendChild(btn);
      });
    }
    
    function renderProducts(products) {
      const container = document.getElementById('productGrid');
      if (!container) return;

      container.innerHTML = '';

      const activeCategory = document.querySelector('.category-btn.active')?.textContent;
      const isSearch = document.getElementById('searchInput').value !== '';

      // Если мы в корне (Все) и нет поиска — рисуем папки
      if (activeCategory === 'Все' && !isSearch) {
        const categories = [...new Set(allProducts.map(p => p.category || 'Без категории'))];
        
        categories.forEach(cat => {
          const folder = document.createElement('div');
          folder.className = 'product-card category-folder'; // Применяем наш новый класс
          folder.innerHTML = `
            <div class="product-name">📁 ${cat}</div>
            <div class="product-price">${allProducts.filter(p => (p.category || 'Без категории') === cat).length} тов.</div>
          `;
          folder.onclick = () => filterByCategory(cat);
          container.appendChild(folder);
        });
        return;
      }

      // Обычный рендеринг товаров (когда зашли в категорию или ищем)
      products.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <div class="product-name">${product.name}</div>
          <div class="product-price">${product.price} ₸</div>
          <div class="quick-add-buttons">
            <button class="quick-add-btn" onclick="event.stopPropagation(); addToCart(${JSON.stringify(product).replace(/"/g, '&quot;')}, 1)">+1</button>
            <button class="quick-add-btn" onclick="event.stopPropagation(); addToCart(${JSON.stringify(product).replace(/"/g, '&quot;')}, 0.5)">+0.5</button>
          </div>
        `;
        card.onclick = () => showQuantityModal(product);
        container.appendChild(card);
      });
    }
    
    function filterByCategory(category) {
      const filtered = category === 'Все' 
        ? allProducts 
        : allProducts.filter(p => (p.category || 'Без категории') === category);
      renderProducts(filtered);
      
      // Обновляем активную кнопку категории
      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent === category);
      });
    }
    
    function searchProducts() {
      const term = document.getElementById('searchInput').value.toLowerCase();
      
      // Если поиск пустой, просто возвращаем вид по категориям
      if (term === '') {
        const activeCategory = document.querySelector('.category-btn.active')?.textContent || 'Все';
        filterByCategory(activeCategory);
        return;
      }

      const filtered = allProducts.filter(p => 
        p.name.toLowerCase().includes(term) || 
        (p.category && p.category.toLowerCase().includes(term))
      );
      
      // Передаем отфильтрованные товары в рендер
      renderProducts(filtered);
    }

    // ================== МОДАЛЬНЫЕ ОКНА ================== //
    
    function showQuantityModal(product) {
      if (!product) return;
      
      currentProduct = product;
      const modal = document.getElementById('quantityModal');
      if (!modal) return;
      
      const productName = document.getElementById('modalProductName');
      if (productName) {
        productName.textContent = product.name;
      }
      
      const quantityInput = document.getElementById('quantityInput');
      if (quantityInput) {
        quantityInput.value = '';
        quantityInput.placeholder = 'Введите количество';
      }
      
      modal.style.display = 'flex';
      
      setTimeout(() => {
        if (quantityInput) {
          quantityInput.focus();
        }
      }, 100);
    }
    
    function closeQuantityModal() {
      const modal = document.getElementById('quantityModal');
      if (modal) {
        modal.style.display = 'none';
      }
    }
    
    function appendToQuantity(value) {
      const input = document.getElementById('quantityInput');
      if (!input) return;
      
      let current = input.value;
      
      if (value === '.' && current.includes('.')) {
        return;
      }
      
      input.value = current + value;
    }
    
    function clearQuantity() {
      const input = document.getElementById('quantityInput');
      if (input) {
        input.value = '';
      }
    }
    
    function handleQuantityKeyDown(event) {
      // Разрешаем: цифры (0-9), точка, Backspace, Delete, Tab, Enter
      if ((event.key >= '0' && event.key <= '9') || 
          event.key === '.' || 
          event.key === 'Backspace' || 
          event.key === 'Delete' || 
          event.key === 'Tab' || 
          event.key === 'Enter') {
        return;
      }
      
      // Запрещаем все остальные символы
      event.preventDefault();
    }
    
    function addToCartWithQuantity() {
      const quantityInput = document.getElementById('quantityInput');
      if (!quantityInput || !currentProduct) return;
      
      const quantity = parseFloat(quantityInput.value) || 0;
      if (quantity > 0) {
        addToCart(currentProduct, quantity);
        closeQuantityModal();
      } else {
        alert('Введите корректное количество');
      }
    }
    
    function processPayment() {
      const customer = getCurrentCustomer();
      if (!customer || customer.cart.length === 0) {
        alert('Добавьте товары в чек перед оплатой');
        return;
      }
      
      // Рассчитываем итоговую сумму с учетом скидки/наценки
      let subtotal = customer.cart.reduce((sum, item) => sum + parseFloat(item.total), 0);
      let total = subtotal;
      
      if (customer.discount.type && customer.discount.percent > 0) {
        if (customer.discount.type === 'discount') {
          total = subtotal - (subtotal * (customer.discount.percent / 100));
        } else if (customer.discount.type === 'markup') {
          total = subtotal + (subtotal * (customer.discount.percent / 100));
        }
      }
      
      const modal = document.getElementById('paymentModal');
      if (!modal) return;
      
      const modalTitle = modal.querySelector('h3');
      if (modalTitle) {
        let discountText = '';
        if (customer.discount.type && customer.discount.percent > 0) {
          discountText = ` (${customer.discount.type === 'discount' ? 'скидка' : 'наценка'} ${customer.discount.percent}%)`;
        }
        
        modalTitle.innerHTML = `Оформление оплаты <small style="display: block; font-size: 0.7em; margin-top: 5px; color: var(--primary);">Сумма: ${Math.round(total)} ₸${discountText}</small>`;
      }
      
      modal.style.display = 'flex';
      const cartContainer = document.querySelector('.cart-container');
      if (cartContainer) {
        cartContainer.classList.remove('expanded');
      }
    }
    
    function closePaymentModal() {
      const modal = document.getElementById('paymentModal');
      if (modal) {
        modal.style.display = 'none';
      }
    }
    
    async function confirmPayment() {
      const customer = getCurrentCustomer();
      if (!customer) return;
      
      if (customer.cart.length === 0) {
        alert('Корзина пуста!');
        return;
      }

      // Получаем данные из полей выбора в модальном окне оплаты
      customer.paymentMethod = document.getElementById('paymentMethod').value;
      customer.organization = document.getElementById('organizationSelect').value;
      customer.counterpartyId = document.getElementById('counterpartySelect').value || null;
      
      // --- РАСЧЕТ ИТОГОВ ДЛЯ ОТЧЕТА ---
      // 1. Базовая сумма товаров без наценок
      let subtotal = customer.cart.reduce((sum, item) => sum + parseFloat(item.total), 0);
      
      let total = subtotal;
      let discountAmount = 0;
      
      // 2. Расчет скидки или наценки (в т.ч. НДС 36% и Kaspi 10%)
      if (customer.discount && customer.discount.type && customer.discount.percent > 0) {
        discountAmount = subtotal * (customer.discount.percent / 100);
        
        if (customer.discount.type === 'discount') {
          total = subtotal - discountAmount;
        } else if (customer.discount.type === 'markup') {
          total = subtotal + discountAmount;
        }
      }

      // Округляем значения до целых чисел (тенге)
      const finalTotal = Math.round(total);
      const finalDiscountAmount = Math.round(discountAmount);
      
      try {
        const response = await fetch('/process_sale', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            cart: customer.cart,
            subtotal: subtotal,
            total: finalTotal,                     // Итоговая сумма с наценкой
            discount_type: customer.discount.type,    // Тип: 'markup' или 'discount'
            discount_percent: customer.discount.percent,
            discount_amount: finalDiscountAmount,     // Сумма наценки/скидки в тенге
            payment_method: customer.paymentMethod,
            organization: customer.organization,
            counterparty_id: customer.counterpartyId,
            customer_name: customer.name
          })
        });
        
        if (response.ok) {
          showNotification(`Продажа оформлена! Итого: ${finalTotal} ₸`, 'success');

          // Скрываем сумму с клиентского экрана после успешной продажи
          if (typeof hideTotalOnScreen === 'function') {
            hideTotalOnScreen();
          }
          
          // Удаляем клиента из активных после оплаты
          customers = customers.filter(c => c.id !== customer.id);
          
          // Если это был последний клиент, создаем новый пустой чек
          if (customers.length === 0) {
            if (typeof addCustomer === 'function') addCustomer();
          } else {
            // Иначе переключаемся на следующего в очереди
            switchCustomer(customers[0].id);
          }
          
          closePaymentModal();
        } else {
          const errorData = await response.json();
          throw new Error(errorData.error || 'Ошибка сервера');
        }
      } catch (error) {
        console.error('Ошибка оплаты:', error);
        alert('Ошибка при оформлении оплаты: ' + error.message);
      }
    }


    // Функция показа уведомлений
    function showNotification(message, type = 'success') {
        // Создаем элемент уведомления
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.textContent = message;
        notification.style.cssText = `
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: ${type === 'success' ? 'var(--primary)' : 'var(--danger)'};
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            z-index: 10000;
            animation: slideDown 0.3s ease;
        `;
        
        document.body.appendChild(notification);
        
        // Удаляем уведомление через 3 секунды
        setTimeout(() => {
            notification.remove();
        }, 3000);
    }

    // ================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ================== //
    
    // Обновите функцию showTotal() для интеграции
    function applyQuickMarkup(percent, label) {
        const customer = getCurrentCustomer();
        if (!customer || customer.cart.length === 0) {
            alert('Добавьте товары в чек!');
            return;
        }
    
        let subtotal = customer.cart.reduce((sum, item) => sum + parseFloat(item.total), 0);
        let totalWithMarkup = subtotal * (1 + percent / 100);
        let finalTotal = Math.round(totalWithMarkup);
    
        customer.discount = {
            type: 'markup',
            percent: percent,
            amount: finalTotal - subtotal
        };
    
        updateCartDisplay();
        showTotalOnScreen(finalTotal, customer.name);
        showNotification(`Применена наценка ${label}: ${percent}%`, 'success');
    }
    
    function showTotal() {
        const customer = getCurrentCustomer();
        if (!customer) return;
        
        let subtotal = customer.cart.reduce((sum, item) => sum + parseFloat(item.total), 0);
        let total = subtotal;
        let discountText = '';
        
        if (customer.discount.type && customer.discount.percent > 0) {
            const discountAmount = subtotal * (customer.discount.percent / 100);
            if (customer.discount.type === 'discount') {
                total = subtotal - discountAmount;
                discountText = ` (скидка ${customer.discount.percent}% = ${Math.round(discountAmount)} ₸)`;
            } else if (customer.discount.type === 'markup') {
                total = subtotal + discountAmount;
                discountText = ` (наценка ${customer.discount.percent}% = ${Math.round(discountAmount)} ₸)`;
            }
        }
        
        // Отправляем сумму на промо-экран через Socket.io
        showTotalOnScreen(Math.round(total), customer.name);
        
        // Также отправляем через HTTP (как backup)
        fetch('/send_to_screen', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                total: total,
                discount_text: discountText,
                payment_method: 'qr',
                items: customer.cart,
                customer_name: customer.name
            })
        })
        .then(response => {
            if (!response.ok) throw new Error('Ошибка отправки на промо-экран');
            console.log('Данные успешно отправлены на промо-экран');
        })
        .catch(error => {
            console.error('Ошибка:', error);
        });
        
        return total;
    }
    
    function handleHotkeys(e) {
        if (!e) return;
        
        switch(e.key) {
            case 'F1': 
                e.preventDefault();
                const searchInput = document.getElementById('searchInput');
                if (searchInput) searchInput.focus();
                break;
            case 'F2': 
                e.preventDefault();
                processPayment();
                break;
            case 'F3': 
                e.preventDefault();
                clearCart();
                // Также скрываем сумму с экрана при очистке корзины
                hideTotalOnScreen();
                break;
            case 'F4': 
                e.preventDefault();
                showDiscountModal();
                break;
            case 'F5': 
                e.preventDefault();
                // Новая горячая клавиша - скрыть сумму с экрана
                hideTotalOnScreen();
                showNotification('Сумма скрыта с экрана', 'success');
                break;
            case 'F9': 
                e.preventDefault();
                // Тестовая команда для промо-экрана
                sendToPromo('play');
                showNotification('Команда "play" отправлена', 'success');
                break;
            case 'F10': 
                e.preventDefault();
                // Тестовая команда для промо-экрана
                sendToPromo('pause');
                showNotification('Команда "pause" отправлена', 'success');
                break;
            case 'Enter':
              if (document.getElementById('quantityModal').style.display === 'flex') {
                e.preventDefault();
                addToCartWithQuantity();
              }
              if (document.getElementById('discountModal').style.display === 'flex') {
                e.preventDefault();
                applyDiscount();
              }
              break;
            case 'Escape':
              if (document.getElementById('quantityModal').style.display === 'flex') {
                closeQuantityModal();
              }
              if (document.getElementById('paymentModal').style.display === 'flex') {
                closePaymentModal();
              }
              if (document.getElementById('discountModal').style.display === 'flex') {
                closeDiscountModal();
              }
              break;
        }
    }

    window.addEventListener('beforeunload', () => {
        hideTotalOnScreen();
    });
  </script>
</body>
</html>
