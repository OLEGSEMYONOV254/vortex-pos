<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Касса</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
      :root {
        --primary: #00cc66;
        --secondary: #ffaa00;
        --danger: #ff3333;
        --discount: #3399ff;
        --folder: #007bff; /* Цвет для папок */
        --dark-bg: #1a1a1a;
        --panel-bg: #2a2a2a;
        --text-light: #ffffff;
        --text-dimmed: #aaaaaa;
      }
      
      /* Общие стили */
      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: var(--dark-bg);
        color: var(--text-light);
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }
      
      /* Навигация */
      .nav-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px;
        background: var(--panel-bg);
        border-bottom: 1px solid #333;
      }
      
      .nav-card {
        padding: 10px 15px;
        background: #3a3a3a;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        text-align: center;
        flex: 1 1 auto;
        min-width: 60px;
        transition: all 0.2s;
      }
      
      .nav-card:hover {
        background: #444;
        transform: translateY(-2px);
      }
      
      /* Основной контейнер */
      .container {
        display: grid;
        grid-template-columns: 1fr;
        gap: 15px;
        padding: 15px;
        max-width: 100%;
      }
      
      /* Заголовок */
      .glow-text {
        text-align: center;
        color: var(--primary);
        margin: 0 0 15px 0;
        font-size: 1.8rem;
        text-shadow: 0 0 10px rgba(0, 204, 102, 0.3);
      }
      
      /* --- НОВАЯ НАВИГАЦИЯ ПО ТОВАРАМ --- */
      
      .breadcrumb-nav {
          padding: 12px;
          background: var(--panel-bg);
          margin-bottom: 10px;
          border-radius: 8px;
          font-size: 1rem;
          border-left: 4px solid var(--primary);
          cursor: default;
      }
  
      .category-search-input {
          width: 100%;
          padding: 12px;
          background: #333;
          border: 2px solid var(--folder);
          border-radius: 8px;
          color: white;
          font-size: 1rem;
          margin-bottom: 15px;
      }
  
      /* Сетка для папок (крупная) */
      .folder-grid {
          display: grid;
          grid-template-columns: repeat(2, 1fr); /* 2 папки в ряд на мобилках */
          gap: 15px;
      }
  
      /* Дизайн карточки-папки */
      .category-card {
          background: var(--panel-bg);
          border: 2px solid var(--folder);
          border-radius: 15px;
          padding: 25px 10px;
          text-align: center;
          transition: all 0.2s;
          box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }
  
      .category-card:active {
          transform: scale(0.95);
          background: #333;
      }
  
      /* Компактный список товаров (внутри папки) */
      .product-list-item {
          display: flex;
          align-items: center;
          background: var(--panel-bg);
          padding: 12px;
          margin-bottom: 8px;
          border-radius: 10px;
          border: 1px solid #444;
          animation: fadeIn 0.2s ease-out;
      }
  
      /* --- КОНЕЦ НОВОЙ НАВИГАЦИИ --- */
  
      /* Вкладки клиентов */
      .customer-tabs {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 8px 0;
        margin-bottom: 10px;
        scrollbar-width: none;
      }
      
      .customer-tab {
        padding: 8px 12px;
        background: #3a3a3a;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        white-space: nowrap;
      }
      
      .customer-tab.active {
        background: var(--primary);
        font-weight: bold;
      }
      
      .btn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
      }
      
      /* Поиск */
      .search-box {
        margin-bottom: 15px;
      }
      
      .search-box input {
        width: 100%;
        padding: 12px 15px;
        font-size: 1rem;
        border-radius: 8px;
        border: none;
        background: #333;
        color: white;
        box-sizing: border-box;
      }
      
      /* Стили сетки (для обычных товаров) */
      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 10px;
        margin-bottom: 15px;
      }
      
      /* Корзина */
      .cart-container {
        background: var(--panel-bg);
        padding: 15px;
        border-radius: 8px;
        margin-top: 15px;
      }
      
      .cart-items {
        max-height: 200px;
        overflow-y: auto;
      }
      
      .cart-total {
        font-weight: bold;
        font-size: 1.3rem;
        text-align: right;
        color: var(--primary);
        margin-top: 15px;
      }
      
      .cart-actions {
        display: flex;
        gap: 10px;
        margin-top: 15px;
        flex-wrap: wrap;
      }
      
      /* Модальные окна */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 2000;
        justify-content: center;
        align-items: center;
      }
      
      .modal-content {
        background: var(--panel-bg);
        padding: 20px;
        border-radius: 10px;
        width: 95%;
        max-width: 380px;
      }
      
      .numeric-keypad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      
      .keypad-btn {
        background: #3a3a3a;
        color: white;
        border: none;
        padding: 18px 0;
        font-size: 1.3rem;
        border-radius: 8px;
      }
  
      .keypad-btn.enter {
        background: var(--primary);
      }
  
      /* Адаптация для мобильных */
      @media (max-width: 768px) {
        .cart-container {
          position: fixed;
          bottom: 0; left: 0; right: 0;
          height: 70vh;
          transform: translateY(100%);
          transition: transform 0.3s ease;
          z-index: 1500;
          border-radius: 20px 20px 0 0;
        }
        
        .cart-container.expanded {
          transform: translateY(0);
        }
        
        .mobile-cart-toggle {
          display: flex;
          position: fixed;
          bottom: 25px;
          right: 25px;
          background: var(--primary);
          width: 65px; height: 65px;
          border-radius: 50%;
          align-items: center;
          justify-content: center;
          z-index: 1600;
          box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
      }
  
      .notification {
          position: fixed;
          top: 20px;
          left: 50%;
          transform: translateX(-50%);
          background: var(--primary);
          padding: 12px 25px;
          border-radius: 30px;
          z-index: 10000;
          box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      }
  </style>
</head>
<body>
  <!-- Навигация -->
  <nav class="nav-grid">
      <a href="/" class="nav-card">🏠 Главная</a>
      <a href="/products" class="nav-card">📦 Товары</a>
      <a href="/kassa" class="nav-card">💵 Касса</a>
      <a href="/stats" class="nav-card">📊 Отчёты</a>
      <a href="/counterparties" class="nav-card">🧾 Контрагенты</a>
  </nav>
  
  <div class="container">
      <h1 class="glow-text">Кассовый аппарат</h1>
  
      <div class="customer-tabs" id="customerTabs">
          <button class="customer-tab active" data-id="0">Клиент 1</button>
          <button class="btn" onclick="addCustomer()">+ Добавить</button>
      </div>
  
      <div class="cart-container">
          <div class="cart-header">
              <div class="cart-title">Текущий чек</div>
              <small class="hotkey-hint">F2 - оплата, F3 - очистка</small>
          </div>
  
          <div class="cart-items" id="cartItems"></div>
  
          <div class="cart-total">
              Итого: <span id="totalAmount">0</span> ₸
          </div>
  
          <div id="discountInfo" class="discount-info"></div>
  
          <div class="cart-actions">
              <div class="quick-markup-buttons">
                  <button onclick="applyQuickMarkup(36, 'НДС')" class="markup-btn">Цена с НДС (36%)</button>
                  <button onclick="applyQuickMarkup(10, 'Kaspi')" class="markup-btn">Цена Kaspi (10%)</button>
              </div>
              <button class="btn" onclick="showTotal()">💵 Показать сумму</button>
              <button class="btn btn-discount" onclick="showDiscountModal()">🎯 Скидка/Наценка (F4)</button>
              <button class="btn btn-danger" onclick="clearCart()">🧹 Очистить (F3)</button>
              <button class="btn btn-pay" onclick="processPayment()">💰 Оплатить (F2)</button>
  
              <div style="display: flex; gap: 5px; margin-top: 10px;">
                  <button class="btn" onclick="sendToPromo('play')" title="Возобновить видео">▶️ Воспр.</button>
                  <button class="btn" onclick="sendToPromo('pause')" title="Приостановить видео">⏸️ Пауза</button>
                  <button class="btn btn-danger" onclick="hideTotalOnScreen()" title="Скрыть сумму">👻 Скрыть</button>
              </div>
          </div>
      </div>
  
      <div class="inventory-section">
          <div class="search-box">
              <input type="text" id="searchInput" placeholder="Поиск товара по всей базе... (F1)" oninput="searchProducts()">
          </div>
  
          <div id="breadcrumb" class="breadcrumb-nav">🏠 Все</div>
  
          <div id="categoryFilterContainer" style="margin-bottom: 10px; display: none;">
              <input type="text" id="categorySearchInput" placeholder="Поиск категории..." oninput="filterFolders()" class="category-search-input">
          </div>
  
          <div class="category-container" id="categoryContainer" style="display:none;"></div>
  
          <div class="product-grid" id="productGrid"></div>
      </div>
  </div>
  
  <div id="quantityModal" class="modal">
      <div class="modal-content">
          <h3 class="modal-title" id="modalProductName"></h3>
          <input type="text" class="quantity-input" id="quantityInput" placeholder="Количество" onkeydown="handleQuantityKeyDown(event)">
          <div class="numeric-keypad">
              <button class="keypad-btn" onclick="appendToQuantity('1')">1</button>
              <button class="keypad-btn" onclick="appendToQuantity('2')">2</button>
              <button class="keypad-btn" onclick="appendToQuantity('3')">3</button>
              <button class="keypad-btn" onclick="appendToQuantity('4')">4</button>
              <button class="keypad-btn" onclick="appendToQuantity('5')">5</button>
              <button class="keypad-btn" onclick="appendToQuantity('6')">6</button>
              <button class="keypad-btn" onclick="appendToQuantity('7')">7</button>
              <button class="keypad-btn" onclick="appendToQuantity('8')">8</button>
              <button class="keypad-btn" onclick="appendToQuantity('9')">9</button>
              <button class="keypad-btn" onclick="appendToQuantity('.')">.</button>
              <button class="keypad-btn zero" onclick="appendToQuantity('0')">0</button>
              <button class="keypad-btn clear" onclick="clearQuantity()">C</button>
          </div>
          <div class="modal-actions">
              <button class="keypad-btn enter" onclick="addToCartWithQuantity()">Добавить (Enter)</button>
              <button class="btn btn-danger" onclick="closeQuantityModal()">Отмена (Esc)</button>
          </div>
      </div>
  </div>
  
  <div id="discountModal" class="modal">
      <div class="modal-content">
          <h3 class="modal-title">Скидка / Наценка</h3>
          <div class="discount-type-selector">
              <button class="discount-type-btn discount-btn active" id="discountBtn" onclick="setDiscountType('discount')">Скидка %</button>
              <button class="discount-type-btn markup-btn" id="markupBtn" onclick="setDiscountType('markup')">Наценка %</button>
          </div>
          <input type="text" class="quantity-input" id="discountInput" placeholder="Введите процент" onkeydown="handleDiscountKeyDown(event)">
          <div class="numeric-keypad">
              <button class="keypad-btn" onclick="appendToDiscount('1')">1</button>
              <button class="keypad-btn" onclick="appendToDiscount('2')">2</button>
              <button class="keypad-btn" onclick="appendToDiscount('3')">3</button>
              <button class="keypad-btn" onclick="appendToDiscount('4')">4</button>
              <button class="keypad-btn" onclick="appendToDiscount('5')">5</button>
              <button class="keypad-btn" onclick="appendToDiscount('6')">6</button>
              <button class="keypad-btn" onclick="appendToDiscount('7')">7</button>
              <button class="keypad-btn" onclick="appendToDiscount('8')">8</button>
              <button class="keypad-btn" onclick="appendToDiscount('9')">9</button>
              <button class="keypad-btn" onclick="appendToDiscount('.')">.</button>
              <button class="keypad-btn zero" onclick="appendToDiscount('0')">0</button>
              <button class="keypad-btn clear" onclick="clearDiscount()">C</button>
          </div>
          <div class="modal-actions">
              <button class="keypad-btn enter" onclick="applyDiscount()">Применить (Enter)</button>
              <button class="btn btn-danger" onclick="closeDiscountModal()">Отмена (Esc)</button>
          </div>
      </div>
  </div>
  
  <div id="paymentModal" class="modal">
      <div class="modal-content payment-modal-content">
          <h3 class="modal-title">Оформление оплаты</h3>
          <div class="payment-input-group">
              <label>Способ оплаты</label>
              <select id="paymentMethod">
                  <option value="cash">💰 Наличные</option>
                  <option value="card">💳 Карта</option>
                  <option value="qr">📱 QR-код</option>
                  <option value="remote">🌐 Удалённая оплата</option>
                  <option value="bill">📄 Счёт на оплату</option>
                  <option value="cash/qr">💰/📱 Наличные+QR</option>
              </select>
          </div>
          <div class="payment-input-group">
              <label>Организация</label>
              <select id="organizationSelect">
                  <option value="Жетес">🏢 Жетес</option>
                  <option value="AS Qadir">🏭 AS Qadir</option>
                  <option value="ЭФФИ">🏭 ЭФФИ</option>
                  <option value="Адым Инжениринг">🏭 Адым Инжениринг</option>
              </select>
          </div>
          <div class="payment-input-group">
              <label>Контрагент</label>
              <select id="counterpartySelect">
                  <option value="">Не выбрано</option>
              </select>
          </div>
          <div class="modal-actions">
              <button class="btn btn-pay" onclick="confirmPayment()">✅ Подтвердить</button>
              <button class="btn btn-danger" onclick="closePaymentModal()">❌ Отмена (Esc)</button>
          </div>
      </div>
  </div>
  
  <div class="mobile-cart-toggle" id="mobileCartToggle">
      🛒 <span id="cartCounter">0</span>
  </div>

  <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
  <script>
      // ================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==================
      let customers = [{
          id: 0,
          name: "Клиент 1",
          cart: [],
          paymentMethod: "qr",
          organization: "vortex",
          counterpartyId: null,
          discount: { type: null, percent: 0, amount: 0 }
      }];
      let currentCustomerId = 0;
      let allProducts = [];
      let counterparties = [];
      let currentProduct = null;
      let discountType = 'discount';
  
      const socket = io();
      const CART_STORAGE_KEY = 'vortex_saved_cart';
  
      // ================== ИНИЦИАЛИЗАЦИЯ ==================
      document.addEventListener('DOMContentLoaded', async () => {
          await loadProducts();
          await loadCounterparties(); // ТЕПЕРЬ ОПРЕДЕЛЕНА
          
          loadCartFromStorage();
          renderCustomerTabs();
          renderCategoryMenu(allProducts);
          renderProducts(allProducts);
  
          const mobileCartToggle = document.getElementById('mobileCartToggle');
          if (mobileCartToggle) {
              mobileCartToggle.addEventListener('click', () => {
                  document.querySelector('.cart-container')?.classList.toggle('expanded');
              });
          }
          document.getElementById('searchInput')?.focus();
  
          socket.on('connect', () => console.log('✅ Vortex POS Connected'));
          socket.on('command_result', (data) => showNotification(data.message, data.success ? 'success' : 'error'));
      });
  
      // ================== ЗАГРУЗКА ДАННЫХ (API) ==================
      async function loadProducts() {
          try {
              const r = await fetch('/get_products');
              allProducts = await r.json();
          } catch(e) { console.error('Ошибка загрузки товаров'); }
      }
  
      async function loadCounterparties() {
          try {
              const r = await fetch('/api/counterparties');
              if (r.ok) {
                  counterparties = await r.json();
                  updateCounterpartySelect();
              }
          } catch(e) { console.error('Ошибка загрузки контрагентов'); }
      }
  
      function updateCounterpartySelect() {
          const select = document.getElementById('counterpartySelect');
          if (!select) return;
          select.innerHTML = '<option value="">Не выбрано</option>';
          counterparties.forEach(c => {
              const opt = document.createElement('option');
              opt.value = c.id;
              opt.textContent = c.name;
              select.appendChild(opt);
          });
      }
  
      // ================== ПОИСК И ФИЛЬТРЫ ==================
      function searchProducts() {
          const term = document.getElementById('searchInput').value.toLowerCase();
          if (!term) {
              const activeCat = document.querySelector('.category-btn.active')?.textContent || 'Все';
              filterByCategory(activeCat);
              return;
          }
          const filtered = allProducts.filter(p => 
              p.name.toLowerCase().includes(term) || 
              (p.category && p.category.toLowerCase().includes(term))
          );
          renderProducts(filtered);
      }
  
      function filterByCategory(category) {
          const filtered = category === 'Все' 
              ? allProducts 
              : allProducts.filter(p => (p.category || 'Без категории') === category);
          
          document.querySelectorAll('.category-btn').forEach(btn => {
              btn.classList.toggle('active', btn.textContent === category);
          });
          renderProducts(filtered);
      }
  
      // ================== ЛОГИКА КЛИЕНТОВ И КОРЗИНЫ ==================
      function getCurrentCustomer() {
          return customers.find(c => c.id === currentCustomerId) || customers[0];
      }
  
      function switchCustomer(id) {
          currentCustomerId = id;
          document.querySelectorAll('.customer-tab').forEach(t => t.classList.toggle('active', parseInt(t.dataset.id) === id));
          updateCartDisplay();
      }
  
      function renderCustomerTabs() {
          const container = document.getElementById('customerTabs');
          if (!container) return;
          const addBtn = container.querySelector('.btn-add-customer') || document.createElement('button');
          container.innerHTML = '';
          customers.forEach(c => {
              const tab = document.createElement('button');
              tab.className = `customer-tab ${c.id === currentCustomerId ? 'active' : ''}`;
              tab.dataset.id = c.id;
              tab.textContent = c.name;
              tab.onclick = () => switchCustomer(c.id);
              container.appendChild(tab);
          });
          container.appendChild(addBtn);
      }
  
      function updateCartDisplay() {
          const customer = getCurrentCustomer();
          const cartItems = document.getElementById('cartItems');
          if (!customer || !cartItems) return;
  
          cartItems.innerHTML = '';
          let subtotal = 0;
  
          customer.cart.forEach(item => {
              subtotal += parseFloat(item.total);
              const div = document.createElement('div');
              div.className = 'cart-item fade-in';
              div.innerHTML = `
                  <div class="cart-item-info">
                      <div class="cart-item-name">${item.name}</div>
                      <div class="cart-item-details">${item.price} ₸ × ${item.quantity} = ${item.total} ₸</div>
                  </div>
                  <div class="cart-item-controls">
                      <button class="quantity-btn" onclick="changeQuantity(${item.id}, -0.5)">-0.5</button>
                      <button class="quantity-btn" onclick="changeQuantity(${item.id}, 0.5)">+0.5</button>
                      <button class="remove-btn" onclick="removeFromCart(${item.id})">×</button>
                  </div>`;
              cartItems.appendChild(div);
          });
  
          let total = subtotal;
          if (customer.discount.type && customer.discount.percent > 0) {
              let diff = subtotal * (customer.discount.percent / 100);
              total = customer.discount.type === 'discount' ? subtotal - diff : subtotal + diff;
              customer.discount.amount = Math.round(diff);
          }
          
          document.getElementById('totalAmount').textContent = Math.round(total);
          document.getElementById('cartCounter').textContent = customer.cart.length;
          saveCartToStorage();
      }
  
      function addToCart(product, quantity = 1) {
          const customer = getCurrentCustomer();
          const existing = customer.cart.find(i => i.id === product.id);
          if (existing) {
              existing.quantity = parseFloat((existing.quantity + quantity).toFixed(2));
              existing.total = Math.round(existing.price * existing.quantity);
          } else {
              customer.cart.push({
                  id: product.id, name: product.name, price: product.price,
                  quantity: quantity, total: Math.round(product.price * quantity)
              });
          }
          updateCartDisplay();
      }
  
      function changeQuantity(id, delta) {
          const customer = getCurrentCustomer();
          const item = customer.cart.find(i => i.id === id);
          if (item) {
              item.quantity = parseFloat((item.quantity + delta).toFixed(2));
              if (item.quantity <= 0) customer.cart = customer.cart.filter(i => i.id !== id);
              else item.total = Math.round(item.price * item.quantity);
              updateCartDisplay();
          }
      }
  
      function removeFromCart(id) {
          const c = getCurrentCustomer();
          c.cart = c.cart.filter(i => i.id !== id);
          updateCartDisplay();
      }
  
      // ================== ИНТЕРФЕЙС ТОВАРОВ ==================
      function renderProducts(products) {
          const container = document.getElementById('productGrid');
          if (!container) return;
          container.innerHTML = '';
  
          products.forEach(p => {
              const card = document.createElement('div');
              card.className = 'product-card';
              card.innerHTML = `
                  <div class="product-name">${p.name}</div>
                  <div class="product-price">${p.price} ₸</div>
                  <div class="quick-add-buttons">
                      <button class="quick-add-btn" onclick="event.stopPropagation(); addToCart(${JSON.stringify(p).replace(/"/g, '&quot;')}, 1)">+1</button>
                      <button class="quick-add-btn" onclick="event.stopPropagation(); addToCart(${JSON.stringify(p).replace(/"/g, '&quot;')}, 0.5)">+0.5</button>
                  </div>`;
              card.onclick = () => showQuantityModal(p);
              container.appendChild(card);
          });
      }
  
      function renderCategoryMenu(products) {
          const container = document.getElementById('categoryContainer');
          if (!container) return;
          const cats = ['Все', ...new Set(products.map(p => p.category || 'Без категории'))];
          container.innerHTML = '';
          cats.forEach(c => {
              const btn = document.createElement('button');
              btn.className = `category-btn ${c === 'Все' ? 'active' : ''}`;
              btn.textContent = c;
              btn.onclick = () => filterByCategory(c);
              container.appendChild(btn);
          });
      }
  
      // ================== СЕРВИСНЫЕ ФУНКЦИИ ==================
      function saveCartToStorage() {
          localStorage.setItem(CART_STORAGE_KEY, JSON.stringify({ customers, currentCustomerId }));
      }
  
      function loadCartFromStorage() {
          const saved = localStorage.getItem(CART_STORAGE_KEY);
          if (saved) {
              try {
                  const data = JSON.parse(saved);
                  customers = data.customers || customers;
                  currentCustomerId = data.currentCustomerId || 0;
              } catch(e) { localStorage.removeItem(CART_STORAGE_KEY); }
          }
      }
  
      function showNotification(msg, type = 'success') {
          const n = document.createElement('div');
          n.className = `notification ${type}`;
          n.textContent = msg;
          n.style.cssText = `position:fixed; top:20px; left:50%; transform:translateX(-50%); background:${type==='success'?'#00cc66':'#ff4444'}; color:white; padding:10px 20px; border-radius:5px; z-index:9999;`;
          document.body.appendChild(n);
          setTimeout(() => n.remove(), 3000);
      }
  
      function showTotalOnScreen(amount, customerName = '') {
          socket.emit('show_total_on_screen', { amount, customer_name: customerName });
      }
  
      function hideTotalOnScreen() {
          socket.emit('hide_total_on_screen');
      }
  
      // Обработка горячих клавиш (Enter, Escape, F1-F4)
      document.addEventListener('keydown', (e) => {
          const isVisible = (id) => document.getElementById(id)?.style.display === 'flex';
          if (e.key === 'Escape') { 
              ['quantityModal', 'paymentModal', 'discountModal'].forEach(id => {
                  const m = document.getElementById(id); if(m) m.style.display = 'none';
              });
          }
          if (e.key === 'Enter') {
              if (isVisible('quantityModal')) addToCartWithQuantity();
              if (isVisible('discountModal')) applyDiscount();
          }
      });
  
      window.addEventListener('beforeunload', () => hideTotalOnScreen());
  </script>
</body>
</html>
